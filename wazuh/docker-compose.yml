services:
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.7.2
    container_name: wazuh.indexer
    networks:
      - wazuh-net
    restart: always
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=SecuRockAdminPassw0rd1!
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer

  wazuh.manager:
    image: wazuh/wazuh-manager:4.7.2
    container_name: wazuh.manager
    depends_on:
      - wazuh.indexer
    networks:
      - wazuh-net
    restart: always
    ports:
      - "1514:1514/tcp"
      - "1514:1514/udp"
      - "1515:1515/tcp"
      - "514:514/udp"
      - "55000:55000/tcp"
    environment:
      - WAZUH_INDEXER_HOSTS=wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecuRockAdminPassw0rd1!
      - API_USERNAME=admin
      - API_PASSWORD=SecuRockAdminPassw0rd1!
    volumes:
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_var_multigroups:/var/ossec/var/multigroups

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.7.2
    container_name: wazuh.dashboard
    depends_on:
      - wazuh.indexer
      - wazuh.manager
    networks:
      - wazuh-net
    ports:
      - "443:5601"
    environment:
      - OPENSEARCH_HOSTS=https://wazuh.indexer:9200
      - WAZUH_API_URL=https://wazuh.manager
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecuRockAdminPassw0rd1!
    volumes:
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom

networks:
  wazuh-net:
    driver: bridge

volumes:
  wazuh-indexer-data:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_api_configuration:
  wazuh_var_multigroups:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:
