services:
  # -------------------------
  # NGINX REVERSE PROXY
  # -------------------------
  nginx:
    image: nginx:alpine
    container_name: securock-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - securock-net

  # -------------------------
  # FRONTEND (Next.js)
  # -------------------------
  frontend:
    build:
      context: ./frontend_next
      dockerfile: Dockerfile
    container_name: securock-frontend
    restart: always
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    networks:
      - securock-net

  # -------------------------
  # BACKEND API (FastAPI)
  # -------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securock-backend
    restart: always
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://securock:supersecretpassword@db:5432/securock
      - REDIS_URL=redis://redis:6379/0
      - OPENSEARCH_URL=https://opensearch:9200
      - SECRET_KEY=${SECRET_KEY:-supersecretkey}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - db
      - redis
      - opensearch
    networks:
      - securock-net

  # -------------------------
  # WORKER (Log Processor)
  # -------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securock-worker
    command: python -m app.workers.log_processor
    restart: always
    environment:
      - DATABASE_URL=postgresql://securock:supersecretpassword@db:5432/securock
      - REDIS_URL=redis://redis:6379/0
      - OPENSEARCH_URL=https://opensearch:9200
    depends_on:
      - db
      - redis
      - opensearch
    networks:
      - securock-net

  # -------------------------
  # POSTGRES DATABASE
  # -------------------------
  db:
    image: postgres:15-alpine
    container_name: securock-db
    restart: always
    environment:
      - POSTGRES_USER=securock
      - POSTGRES_PASSWORD=supersecretpassword
      - POSTGRES_DB=securock
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - securock-net

  # -------------------------
  # REDIS (Queue/Cache)
  # -------------------------
  redis:
    image: redis:7-alpine
    container_name: securock-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - securock-net

  # -------------------------
  # OPENSEARCH (Logs/Analytics)
  # -------------------------
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: securock-opensearch
    restart: always
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks:
      - securock-net

  # -------------------------
  # WAZUH MANAGER
  # -------------------------
  wazuh.manager:
    image: wazuh/wazuh-manager:4.7.2
    container_name: securock-wazuh
    restart: always
    ports:
      - "1514:1514/udp" # Agent connection
      - "1515:1515/tcp" # Enrollment
      - "55000:55000/tcp" # API
    environment:
      - INDEXER_URL=https://opensearch:9200
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
    depends_on:
      - opensearch
    networks:
      - securock-net

networks:
  securock-net:
    driver: bridge

volumes:
  postgres_data:
  opensearch_data:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
