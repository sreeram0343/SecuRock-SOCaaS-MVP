version: '3.8'

services:
  backend:
    build: ./backend
    container_name: securock-backend
    ports:
      - "8000:8000"
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - WAZUH_URL=https://wazuh:55000
    depends_on:
      - opensearch
    networks:
      - securock_net

  frontend:
    build: ./frontend
    container_name: securock-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - securock_net

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: securock-opensearch
    environment:
      - cluster.name=securock-os
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - plugins.security.disabled=true
    ports:
      - "9200:9200"
    networks:
      - securock_net

  wazuh:
    image: wazuh/wazuh-manager:4.7.2
    container_name: securock-wazuh
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - WAZUH_API_USER=wazuh-wui
      - WAZUH_API_PASSWORD=wazuh-wui
    volumes:
      - ./infra/wazuh_rules/local_rules.xml:/var/ossec/etc/rules/local_rules.xml
    networks:
      - securock_net

  logstash:
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:7.16.3
    container_name: securock-logstash
    volumes:
      - ./infra/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - opensearch
      - wazuh
    networks:
      - securock_net

networks:
  securock_net:
    driver: bridge
